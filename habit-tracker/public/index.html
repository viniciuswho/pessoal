<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hábitos · Desafio Laura vs Vinícius</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f4f6f8; --card:#fff; --ink:#161a1f; --muted:#7b828d;
    --line:#ececf0; --line2:#e2e4e9;
    --vini:#25d366; --vini-dark:#0e8a4f; --vini-soft:#e7f8ee;
    --laura:#ec4899; --laura-dark:#be185d; --laura-soft:#fdeef6;
    --gold:#f59e0b; --alta:#ef4444; --media:#f59e0b;
    --r:18px; --shadow:0 1px 2px rgba(16,17,28,.04),0 8px 24px rgba(16,17,28,.05);
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;line-height:1.45}
  a{color:inherit}

  .layout{display:flex;min-height:100vh}
  /* Sidebar */
  .sidebar{width:236px;flex:none;background:var(--card);border-right:1px solid var(--line);
    padding:22px 16px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px}
  .brand .logo{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:20px;
    background:linear-gradient(135deg,var(--vini),var(--laura));box-shadow:var(--shadow)}
  .brand b{font-size:16px;font-weight:800;letter-spacing:-.02em;display:block}
  .brand small{color:var(--muted);font-size:11.5px;font-weight:500}
  .nav-label{font-size:10.5px;font-weight:700;color:#a9aeb7;text-transform:uppercase;letter-spacing:.06em;padding:8px 10px 4px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:12px;cursor:pointer;
    font-weight:600;font-size:14px;color:#454b54;transition:.15s;border:1px solid transparent}
  .nav-item:hover{background:var(--bg)}
  .nav-item.active{background:var(--bg);border-color:var(--line2);color:var(--ink)}
  .nav-item .ic{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-size:14px;flex:none}
  .nav-item .dot{width:9px;height:9px;border-radius:50%}
  .side-foot{margin-top:auto;padding:10px}
  .sync{font-size:11.5px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:6px}
  .sync .pulse{width:8px;height:8px;border-radius:50%;background:var(--vini)}

  /* Main */
  .main{flex:1;min-width:0;padding:26px 30px 64px}
  .toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:22px}
  .chips{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px}
  .chips button{border:0;background:transparent;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);
    padding:8px 15px;border-radius:999px;cursor:pointer;transition:.15s}
  .chips button.active{background:var(--ink);color:#fff}
  .custom{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
  .custom input{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line2);border-radius:10px;background:var(--card)}
  .range-txt{font-size:12.5px;color:var(--muted);font-weight:600;margin-left:auto}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:22px}
  .panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .panel-head h2{font-size:15px;font-weight:700;margin:0;letter-spacing:-.01em}
  .panel-head .hint{color:var(--muted);font-size:12.5px;font-weight:500}
  .stack{display:flex;flex-direction:column;gap:20px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}

  /* Challenge + prize */
  .hero{display:grid;grid-template-columns:1.3fr 1fr;gap:20px}
  .challenge{background:linear-gradient(135deg,#101418,#1c2530);color:#fff;border:0}
  .challenge h2{color:#fff}
  .challenge .hint{color:#9fb0c0}
  .ch-stats{display:flex;gap:26px;margin-top:6px;flex-wrap:wrap}
  .ch-stat .n{font-size:26px;font-weight:800;letter-spacing:-.02em}
  .ch-stat .l{font-size:11.5px;color:#9fb0c0;font-weight:500}
  .ch-bar{height:8px;background:rgba(255,255,255,.14);border-radius:999px;margin-top:16px;overflow:hidden}
  .ch-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--vini),var(--laura));border-radius:999px}
  .prize{display:flex;flex-direction:column;justify-content:center;text-align:center;
    background:linear-gradient(135deg,#fff7e6,#fff);border:1px solid #f6e3bc}
  .prize .gift{font-size:40px}
  .prize h3{margin:8px 0 2px;font-size:16px;font-weight:800}
  .prize p{margin:0;color:#9a7a35;font-size:13px;font-weight:600}
  .prize .who{margin-top:12px;font-size:12.5px;color:var(--muted);font-weight:500}

  /* Habits-of-each card */
  .hab-cols{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  .hab-cols .who{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;margin-bottom:12px}
  .hab-cols .who .dot{width:10px;height:10px;border-radius:50%}
  .hab-li{display:flex;align-items:center;gap:9px;padding:7px 0;font-size:13.5px;border-top:1px solid var(--line)}
  .hab-li .flag{font-size:13px;width:16px}
  .hab-li .g{margin-left:auto;color:var(--muted);font-size:11.5px;font-weight:600}

  /* Scoreboard */
  .scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px}
  .score-card{display:flex;align-items:center;gap:18px;padding:22px;border-radius:var(--r);background:var(--card);
    border:1px solid var(--line);box-shadow:var(--shadow)}
  .score-card .who{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
  .score-card .dot{width:10px;height:10px;border-radius:50%}
  .score-card .pct{font-size:30px;font-weight:800;letter-spacing:-.03em;margin-top:2px}
  .score-card .sub{color:var(--muted);font-size:12px;font-weight:500}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;
    margin-top:8px;background:#fff7ed;color:#b45309;border:1px solid #fde6c8}
  .vs{font-weight:800;color:var(--muted);font-size:14px;width:44px;height:44px;border-radius:50%;
    display:grid;place-items:center;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow)}

  /* chart legend */
  .clegend{display:flex;gap:16px;margin-bottom:8px}
  .clegend span{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600}
  .clegend .sw{width:14px;height:14px;border-radius:4px}

  /* horizontal bars */
  .bars{display:flex;flex-direction:column;gap:13px}
  .bar-row{display:grid;grid-template-columns:135px 1fr 78px;align-items:center;gap:12px}
  .bar-row .lbl{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-row .lbl .flag{font-size:12px}
  .twin{display:flex;flex-direction:column;gap:5px}
  .track{height:9px;background:var(--bg);border-radius:999px;overflow:hidden}
  .fill{height:100%;border-radius:999px;transition:width .6s cubic-bezier(.4,0,.2,1)}
  .bar-row .val{font-size:12px;font-weight:700;text-align:right;color:var(--muted)}

  /* person header */
  .phead{display:flex;align-items:center;gap:16px;padding:24px;border-radius:var(--r);color:#fff;box-shadow:var(--shadow)}
  .phead .av{width:54px;height:54px;border-radius:16px;display:grid;place-items:center;font-size:26px;background:rgba(255,255,255,.18)}
  .phead h2{margin:0;font-size:22px;font-weight:800;letter-spacing:-.02em}
  .phead p{margin:4px 0 0;font-size:13.5px;opacity:.92;font-weight:500;font-style:italic}

  /* table */
  .tbl-wrap{overflow-x:auto}
  .htable{width:100%;border-collapse:separate;border-spacing:0;min-width:520px}
  .htable thead th{font-size:11px;font-weight:600;color:var(--muted);padding:0 0 12px;text-align:center}
  .htable thead th.habit-col{text-align:left}
  .dcol{display:flex;flex-direction:column;line-height:1.25}
  .dcol span{font-size:10px;color:#aeb2bb;font-weight:500}
  .row-habit{border-top:1px solid var(--line)}
  .habit-cell{display:flex;align-items:center;gap:10px;padding:12px 12px 12px 2px;min-width:180px}
  .habit-cell .flag{font-size:13px;width:16px;text-align:center}
  .habit-cell .name{font-weight:600;font-size:13.5px}
  .habit-cell .meta{color:var(--muted);font-size:11px;font-weight:500}
  .cell{height:50px;text-align:center}
  .mark{width:30px;height:30px;border-radius:9px;border:1.5px solid var(--line2);background:var(--bg);
    display:grid;place-items:center;cursor:pointer;transition:.12s;padding:0}
  .mark:hover{border-color:#c7cbd2;transform:scale(1.07)}
  .mark.miss{background:#fff;border-style:dashed}
  .mark svg{width:16px;height:16px}
  .edit-hint{font-size:11.5px;color:var(--muted);margin-top:12px;display:flex;align-items:center;gap:6px}

  /* insights */
  .insights{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .ins{display:flex;gap:12px;padding:15px;border-radius:14px;border:1px solid var(--line);background:var(--bg)}
  .ins .em{font-size:20px}
  .ins b{display:block;font-size:13.5px;margin-bottom:2px}
  .ins span{font-size:12.5px;color:var(--muted);font-weight:500}
  .ins.good{background:var(--vini-soft);border-color:#cdeede}
  .ins.warn{background:#fef3f2;border-color:#fcd9d4}

  @media(max-width:880px){
    .layout{flex-direction:column}
    .sidebar{width:auto;height:auto;position:static;flex-direction:row;flex-wrap:wrap;align-items:center;gap:8px}
    .brand{padding:6px 8px;width:100%}
    .side-foot{margin:0}
    .nav-label{display:none}
    .main{padding:18px 16px 48px}
    .hero,.grid-2,.hab-cols,.scoreboard,.insights{grid-template-columns:1fr}
    .vs{display:none}
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">🔥</div>
      <div><b>Hábitos</b><small>Desafio do casal</small></div>
    </div>
    <div class="nav-label">Painel</div>
    <div class="nav-item" data-nav="comp"><span class="ic" style="background:#fff5e0">🏆</span>Competição</div>
    <div class="nav-item" data-nav="laura"><span class="ic" style="background:var(--laura-soft)"><span class="dot" style="background:var(--laura)"></span></span>Laura</div>
    <div class="nav-item" data-nav="vini"><span class="ic" style="background:var(--vini-soft)"><span class="dot" style="background:var(--vini)"></span></span>Vinícius</div>
    <div class="side-foot"><div class="sync"><span class="pulse"></span> sincronizado · site + Telegram</div></div>
  </aside>

  <main class="main">
    <div class="toolbar" id="toolbar"></div>
    <div id="content"></div>
  </main>
</div>

<script>
/* ===================== Config ===================== */
const P = {
  vini:  { id:'vini',  name:'Vinícius', color:'#25d366', dark:'#0e8a4f', soft:'#e7f8ee', emoji:'🧔', phrase:'Disciplina é liberdade. Um dia de cada vez. 💪' },
  laura: { id:'laura', name:'Laura',    color:'#ec4899', dark:'#be185d', soft:'#fdeef6', emoji:'👩', phrase:'Pequenos passos todos os dias viram grandes conquistas. ✨' },
};
const HABITS = [
  { id:'acordar', name:'Acordar <7h',         flag:'🔴', goal:'Todo dia',     weekly:7 },
  { id:'deus',    name:'Intimidade com Deus', flag:'🔴', goal:'Todo dia',     weekly:7 },
  { id:'fisica',  name:'Atividade Física',    flag:'🔴', goal:'5x / semana',  weekly:5 },
  { id:'estudo',  name:'Estudo',              flag:'🔵', goal:'1h por dia',    weekly:7 },
  { id:'leitura', name:'Leitura',             flag:'🔵', goal:'30min por dia', weekly:7 },
  { id:'social',  name:'Redes Sociais',       flag:'🔵', goal:'menos de 1h',   weekly:7 },
];
const START='2026-06-22', END='2026-07-10';
// "Hoje" no fuso de São Paulo, limitado à janela do desafio.
function todayISO(){ return new Intl.DateTimeFormat('en-CA',{timeZone:'America/Sao_Paulo'}).format(new Date()); }
const _today = todayISO();
const ANCHOR = _today < START ? START : (_today > END ? END : _today);

/* ===================== Datas ===================== */
function allDates(){ const out=[]; let d=new Date(START+'T12:00'); const e=new Date(END+'T12:00');
  while(d<=e){ out.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); } return out; }
const DATES = allDates();
const dow=iso=>['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][new Date(iso+'T12:00').getDay()];
const ddmm=iso=>iso.slice(8,10)+'/'+iso.slice(5,7);

/* ===================== Dados (API + Redis) ===================== */
let DATA = { vini:{}, laura:{} };

async function loadData(){
  try{
    const r = await fetch('/api/data', { cache:'no-store' });
    if(r.ok){ const v = await r.json(); DATA = (v && v.vini) ? v : { vini:{}, laura:{} }; }
  }catch(e){ console.error('Falha ao carregar dados:', e); }
}

async function saveToggle(pid, hid, iso){
  const r = await fetch('/api/toggle', {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify({ pid, hid, iso }),
  });
  if(!r.ok) throw new Error('HTTP '+r.status);
}

/* ===================== Estado ===================== */
let activeTab='comp';
let filter={mode:'7d', from:null, to:null};

function currentRange(){
  const idx=DATES.indexOf(ANCHOR);
  if(filter.mode==='hoje')  return [DATES[idx]];
  if(filter.mode==='ontem') return [DATES[Math.max(0,idx-1)]];
  if(filter.mode==='7d')    return DATES.slice(Math.max(0,idx-6), idx+1);
  if(filter.mode==='custom'){ const f=filter.from||DATES[Math.max(0,idx-6)], t=filter.to||DATES[idx];
    return DATES.filter(d=>d>=f && d<=t); }
  return DATES.slice(0,idx+1);
}

/* ===================== Métricas ===================== */
const H=id=>HABITS.find(h=>h.id===id);
const doneOn=(pid,hid,iso)=>!!DATA[pid][hid+'__'+iso];
const habitDone=(pid,hid,range)=>range.filter(iso=>doneOn(pid,hid,iso)).length;
const countDay=(pid,iso)=>HABITS.filter(h=>doneOn(pid,h.id,iso)).length;
const dailyPct=(pid,iso)=>Math.round(countDay(pid,iso)/HABITS.length*100);
const expDays=(h,range)=>Math.max(1, Math.round(h.weekly/7*range.length));
function habitPct(pid,hid,range){ return Math.min(100, Math.round(habitDone(pid,hid,range)/expDays(H(hid),range)*100)); }
function overallPct(pid,range){ let d=0,e=0; HABITS.forEach(h=>{ d+=Math.min(habitDone(pid,h.id,range),expDays(h,range)); e+=expDays(h,range); }); return e?Math.round(d/e*100):0; }

/* ===================== Helpers visuais ===================== */
const svg=(w,h,inner)=>`<svg viewBox="0 0 ${w} ${h}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block;max-height:270px">${inner}</svg>`;
const check=c=>`<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="${c||'#fff'}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
function ring(pct,color,size=88){
  const r=(size-12)/2,c=2*Math.PI*r,off=c*(1-pct/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex:none">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#eef0f3" stroke-width="9"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="50%" y="50%" text-anchor="middle" dy=".35em" font-size="20" font-weight="800" fill="${color}">${pct}%</text></svg>`;
}

/* ====== gráfico: barras agrupadas diárias (com valores) ====== */
function chartDaily(range){
  const d=range.map(iso=>({lbl:ddmm(iso),dw:dow(iso),v:dailyPct('vini',iso),l:dailyPct('laura',iso)}));
  const n=d.length||1, gW=n<=7?78:(n<=12?54:38), pl=30,pr=12,pt=20,pb=40;
  const W=pl+pr+n*gW, Ht=250, ih=Ht-pt-pb, y=v=>pt+ih*(1-v/100);
  let g='';
  [0,50,100].forEach(v=>{ g+=`<line x1="${pl}" y1="${y(v)}" x2="${W-pr}" y2="${y(v)}" stroke="#f0f1f4"/><text x="${pl-6}" y="${y(v)}" text-anchor="end" dy=".32em" font-size="9" fill="#b3b7bf">${v}</text>`; });
  d.forEach((row,i)=>{ const cx=pl+i*gW+gW/2, bw=Math.min(18,gW*.32), x1=cx-bw-2, x2=cx+2;
    g+=`<rect x="${x1}" y="${y(row.v)}" width="${bw}" height="${ih*row.v/100}" rx="3" fill="${P.vini.color}"/>`;
    g+=`<rect x="${x2}" y="${y(row.l)}" width="${bw}" height="${ih*row.l/100}" rx="3" fill="${P.laura.color}"/>`;
    if(gW>=48){ g+=`<text x="${x1+bw/2}" y="${y(row.v)-4}" text-anchor="middle" font-size="8.5" font-weight="700" fill="${P.vini.dark}">${row.v}</text>`;
      g+=`<text x="${x2+bw/2}" y="${y(row.l)-4}" text-anchor="middle" font-size="8.5" font-weight="700" fill="${P.laura.dark}">${row.l}</text>`; }
    g+=`<text x="${cx}" y="${Ht-22}" text-anchor="middle" font-size="9" fill="#7c828d">${row.lbl}</text>`;
    g+=`<text x="${cx}" y="${Ht-10}" text-anchor="middle" font-size="8" fill="#b3b7bf">${row.dw}</text>`; });
  return svg(W,Ht,g);
}

/* ====== gráfico: corrida acumulada (com valores no fim) ====== */
function chartRace(range){
  let cv=0,cl=0; const pts=range.map(iso=>{ cv+=countDay('vini',iso); cl+=countDay('laura',iso); return {iso,cv,cl}; });
  const n=pts.length, maxV=Math.max(1,cv,cl), pl=30,pr=52,pt=16,pb=30, W=520,Ht=230, iw=W-pl-pr, ih=Ht-pt-pb;
  const x=i=>n<=1?pl+iw/2:pl+iw*i/(n-1), y=v=>pt+ih*(1-v/maxV);
  let g='';
  [0,maxV/2,maxV].forEach(v=>{ const vv=Math.round(v); g+=`<line x1="${pl}" y1="${y(v)}" x2="${W-pr}" y2="${y(v)}" stroke="#f0f1f4"/><text x="${pl-6}" y="${y(v)}" text-anchor="end" dy=".32em" font-size="9" fill="#b3b7bf">${vv}</text>`; });
  for(let i=0;i<n;i+=Math.ceil(n/6)||1) g+=`<text x="${x(i)}" y="${Ht-8}" text-anchor="middle" font-size="9" fill="#b3b7bf">${ddmm(pts[i].iso)}</text>`;
  [['cv',P.vini],['cl',P.laura]].forEach(([k,pe])=>{
    const path=pts.map((p,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(p[k]).toFixed(1)).join(' ');
    g+=`<path d="${path}" fill="none" stroke="${pe.color}" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>`;
    g+=pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p[k]).toFixed(1)}" r="2.4" fill="#fff" stroke="${pe.color}" stroke-width="1.6"/>`).join('');
    const last=pts[n-1]; g+=`<text x="${x(n-1)+8}" y="${y(last[k])}" dy=".32em" font-size="12" font-weight="800" fill="${pe.dark}">${last[k]}</text>`; });
  return svg(W,Ht,g);
}

/* ====== barras horizontais por hábito (comparativo) ====== */
function barsHabitCompare(range){
  return `<div class="bars">`+HABITS.map(h=>{
    const v=habitPct('vini',h.id,range), l=habitPct('laura',h.id,range);
    return `<div class="bar-row"><div class="lbl"><span class="flag">${h.flag}</span>${h.name}</div>
      <div class="twin">
        <div class="track"><div class="fill" style="width:${l}%;background:${P.laura.color}"></div></div>
        <div class="track"><div class="fill" style="width:${v}%;background:${P.vini.color}"></div></div>
      </div>
      <div class="val"><span style="color:${P.laura.dark}">${l}%</span> · <span style="color:${P.vini.dark}">${v}%</span></div></div>`;
  }).join('')+`</div>`;
}

/* ====== gráfico de linha individual (com valores) ====== */
function chartPersonDaily(pid,range){
  const pe=P[pid], d=range.map(iso=>({lbl:ddmm(iso),v:dailyPct(pid,iso)})), n=d.length||1;
  const pl=28,pr=14,pt=18,pb=30, W=Math.max(440,n*50), Ht=210, iw=W-pl-pr, ih=Ht-pt-pb;
  const x=i=>n<=1?pl+iw/2:pl+iw*i/(n-1), y=v=>pt+ih*(1-v/100);
  let g='';
  [0,50,100].forEach(v=>{ g+=`<line x1="${pl}" y1="${y(v)}" x2="${W-pr}" y2="${y(v)}" stroke="#f0f1f4"/><text x="${pl-6}" y="${y(v)}" text-anchor="end" dy=".32em" font-size="9" fill="#b3b7bf">${v}</text>`; });
  const path=d.map((p,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(p.v).toFixed(1)).join(' ');
  const area=`M${x(0)} ${y(0)} `+d.map((p,i)=>'L'+x(i).toFixed(1)+' '+y(p.v).toFixed(1)).join(' ')+` L${x(n-1)} ${y(0)} Z`;
  g+=`<path d="${area}" fill="${pe.color}" opacity=".07"/><path d="${path}" fill="none" stroke="${pe.color}" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>`;
  d.forEach((p,i)=>{ g+=`<circle cx="${x(i).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="3" fill="#fff" stroke="${pe.color}" stroke-width="1.8"/>`;
    if(n<=14) g+=`<text x="${x(i)}" y="${y(p.v)-8}" text-anchor="middle" font-size="8.5" font-weight="700" fill="${pe.dark}">${p.v}</text>`;
    g+=`<text x="${x(i)}" y="${Ht-8}" text-anchor="middle" font-size="8.5" fill="#b3b7bf">${p.lbl}</text>`; });
  return svg(W,Ht,g);
}

/* ====== tabela editável ====== */
function tableEditable(pid,range){
  let h='<table class="htable"><thead><tr><th class="habit-col">Hábito</th>';
  range.forEach(iso=>h+=`<th><div class="dcol">${dow(iso)}<span>${ddmm(iso)}</span></div></th>`);
  h+='</tr></thead><tbody>';
  HABITS.forEach(hb=>{ h+=`<tr class="row-habit"><td><div class="habit-cell"><span class="flag">${hb.flag}</span><span><span class="name">${hb.name}</span><div class="meta">${hb.goal}</div></span></div></td>`;
    range.forEach(iso=>{ const done=doneOn(pid,hb.id,iso);
      h+=`<td class="cell"><button class="mark ${done?'done':'miss'}" data-toggle="${pid}|${hb.id}|${iso}" title="clique para marcar/desmarcar" ${done?`style="background:${P[pid].color};border-color:transparent"`:''}>${done?check():''}</button></td>`; });
    h+='</tr>'; });
  return h+'</tbody></table>';
}

/* ===================== Render: Aba Competição ===================== */
function renderComp(range){
  const vp=overallPct('vini',range), lp=overallPct('laura',range);
  const leader=vp===lp?null:(vp>lp?'vini':'laura');
  const idx=DATES.indexOf(ANCHOR), total=DATES.length, dayNum=idx-DATES.indexOf(START)+1, remaining=DATES.indexOf(END)-idx;
  const challenge=`<section class="panel challenge"><div class="panel-head"><div><h2>🔥 Desafio em andamento</h2>
      <div class="hint">22/06 → 10/07 · vence quem tiver o maior % de atingimento</div></div></div>
    <div class="ch-stats">
      <div class="ch-stat"><div class="n">Dia ${dayNum}</div><div class="l">de ${total} dias</div></div>
      <div class="ch-stat"><div class="n">${remaining}</div><div class="l">dias restantes</div></div>
      <div class="ch-stat"><div class="n">${HABITS.length}</div><div class="l">hábitos em jogo</div></div>
    </div><div class="ch-bar"><i style="width:${Math.round(dayNum/total*100)}%"></i></div></section>`;

  const prize=`<section class="panel prize"><div class="gift">🎁</div><h3>Presente Misterioso</h3>
    <p>Quem vencer o desafio ganha um presente surpresa! 🤫</p>
    <div class="who">${leader?`Prévia: <b style="color:${P[leader].dark}">${P[leader].name}</b> está na frente`:'Empate técnico — tudo em aberto!'}</div></section>`;

  const habitCard=`<section class="panel"><div class="panel-head"><div><h2>Hábitos de cada um</h2><div class="hint">O que está sendo monitorado no desafio</div></div></div>
    <div class="hab-cols">${['laura','vini'].map(pid=>`<div><div class="who"><span class="dot" style="background:${P[pid].color}"></span>${P[pid].name}</div>
      ${HABITS.map(h=>`<div class="hab-li"><span class="flag">${h.flag}</span>${h.name}<span class="g">${h.goal}</span></div>`).join('')}</div>`).join('')}</div></section>`;

  const card=(pid,pct)=>`<div class="score-card">${ring(pct,P[pid].color)}<div>
      <div class="who"><span class="dot" style="background:${P[pid].color}"></span>${P[pid].name}</div>
      <div class="pct" style="color:${P[pid].dark}">${pct}%</div><div class="sub">de atingimento no período</div>
      ${leader===pid?'<div class="badge">⭐ Liderando</div>':''}</div></div>`;
  const score=`<section class="scoreboard">${card('laura',lp)}<div class="vs">VS</div>${card('vini',vp)}</section>`;

  document.getElementById('content').innerHTML = `<div class="stack">
    <div class="hero">${challenge}${prize}</div>
    ${habitCard}
    ${score}
    <section class="panel"><div class="panel-head"><div><h2>Atingimento por dia (%)</h2><div class="hint">Comparativo diário — valores acima de cada barra</div></div></div>
      <div class="clegend"><span><span class="sw" style="background:${P.laura.color}"></span>Laura</span><span><span class="sw" style="background:${P.vini.color}"></span>Vinícius</span></div>
      ${chartDaily(range)}</section>
    <div class="grid-2">
      <section class="panel"><div class="panel-head"><div><h2>Corrida acumulada</h2><div class="hint">Total de hábitos cumpridos somando os dias</div></div></div>
        <div class="clegend"><span><span class="sw" style="background:${P.laura.color}"></span>Laura</span><span><span class="sw" style="background:${P.vini.color}"></span>Vinícius</span></div>
        ${chartRace(range)}</section>
      <section class="panel"><div class="panel-head"><div><h2>Comparativo por hábito</h2><div class="hint">% da meta no período · Laura · Vinícius</div></div></div>
        ${barsHabitCompare(range)}</section>
    </div>
  </div>`;
}

/* ===================== Render: Aba pessoa ===================== */
function insights(pid,range){
  const pe=P[pid];
  const stats=HABITS.map(h=>({h,pct:habitPct(pid,h.id,range),done:habitDone(pid,h.id,range),exp:expDays(h,range)})).sort((a,b)=>b.pct-a.pct);
  const best=stats[0], worst=stats[stats.length-1];
  let streak=0; for(let i=range.length-1;i>=0;i--){ if(dailyPct(pid,range[i])>=80) streak++; else break; }
  const attention=stats.filter(s=>s.pct<60);
  const cards=[];
  cards.push(`<div class="ins good"><div class="em">🔥</div><div><b>Destaque: ${best.h.name}</b><span>${best.pct}% de atingimento (${best.done}/${best.exp}). Continue assim!</span></div></div>`);
  cards.push(`<div class="ins"><div class="em">⚡</div><div><b>Sequência atual</b><span>${streak} dia(s) seguidos com 80%+ dos hábitos. ${streak>=3?'Você está embalado!':'Bora emendar mais dias!'}</span></div></div>`);
  if(attention.length) cards.push(`<div class="ins warn"><div class="em">⚠️</div><div><b>Ponto de atenção: ${worst.h.name}</b><span>Só ${worst.pct}% (${worst.done}/${worst.exp}). ${attention.length>1?`Outros ${attention.length-1} hábito(s) também precisam de foco.`:'Foco aqui nos próximos dias.'}</span></div></div>`);
  else cards.push(`<div class="ins good"><div class="em">✅</div><div><b>Tudo em dia</b><span>Nenhum hábito abaixo de 60%. Mandando muito bem!</span></div></div>`);
  const op=overallPct(pid,range);
  cards.push(`<div class="ins"><div class="em">🎯</div><div><b>Média geral: ${op}%</b><span>${op>=80?'Excelente ritmo no desafio.':op>=60?'Bom caminho — dá pra subir mais.':'Hora de acelerar pra brigar pelo prêmio!'}</span></div></div>`);
  return `<div class="insights">${cards.join('')}</div>`;
}
function renderPerson(pid,range){
  const pe=P[pid];
  const metas=`<section class="panel"><div class="panel-head"><div><h2>Minhas metas</h2><div class="hint">O que preciso cumprir no desafio</div></div></div>
    <div class="bars">${HABITS.map(h=>`<div class="bar-row"><div class="lbl"><span class="flag">${h.flag}</span>${h.name}</div>
      <div class="track"><div class="fill" style="width:${habitPct(pid,h.id,range)}%;background:${pe.color}"></div></div>
      <div class="val">${h.goal} · ${habitPct(pid,h.id,range)}%</div></div>`).join('')}</div></section>`;

  const table=`<section class="panel"><div class="panel-head"><div><h2>Acompanhamento diário</h2><div class="hint">Clique nas células para marcar — sincroniza na hora com o site e o Telegram</div></div></div>
    <div class="tbl-wrap">${tableEditable(pid,range)}</div>
    <div class="edit-hint">✏️ Editável: clique para marcar ✓ ou desmarcar. Salvo automaticamente na nuvem.</div></section>`;

  const analytics=`<div class="grid-2">
    <section class="panel"><div class="panel-head"><div><h2>Resumo do período</h2></div></div>
      <div style="display:flex;align-items:center;gap:20px">${ring(overallPct(pid,range),pe.color)}
        <div><div style="font-size:13px;color:var(--muted);font-weight:600">Atingimento geral</div>
        <div style="font-size:13px;color:var(--muted);margin-top:6px">${range.length} dia(s) no período</div></div></div>
      <div style="margin-top:18px" class="bars">${HABITS.map(h=>`<div class="bar-row"><div class="lbl"><span class="flag">${h.flag}</span>${h.name}</div>
        <div class="track"><div class="fill" style="width:${habitPct(pid,h.id,range)}%;background:${pe.color}"></div></div>
        <div class="val">${habitPct(pid,h.id,range)}%</div></div>`).join('')}</div></section>
    <section class="panel"><div class="panel-head"><div><h2>Atingimento ao longo dos dias</h2><div class="hint">% diário com valores</div></div></div>${chartPersonDaily(pid,range)}</section>
  </div>`;

  const insightsSec=`<section class="panel"><div class="panel-head"><div><h2>Insights & pontos de atenção</h2><div class="hint">Análise automática dos seus hábitos no período</div></div></div>${insights(pid,range)}</section>`;

  document.getElementById('content').innerHTML=`<div class="stack">
    <section class="phead" style="background:linear-gradient(135deg,${pe.color},${pe.dark})">
      <div class="av">${pe.emoji}</div><div><h2>${pe.name}</h2><p>"${pe.phrase}"</p></div></section>
    ${metas}${table}${analytics}${insightsSec}</div>`;
}

/* ===================== Render: toolbar + sidebar ===================== */
function renderToolbar(range){
  const chips=[['hoje','Hoje'],['ontem','Ontem'],['7d','Últimos 7 dias'],['custom','Personalizado']];
  const custom = filter.mode==='custom'
    ? `<div class="custom"><input type="date" id="from" min="${START}" max="${ANCHOR}" value="${filter.from||range[0]}"> até <input type="date" id="to" min="${START}" max="${ANCHOR}" value="${filter.to||range[range.length-1]}"></div>` : '';
  const rtxt = range.length ? `${ddmm(range[0])} → ${ddmm(range[range.length-1])} · ${range.length} dia(s)` : 'sem dados';
  document.getElementById('toolbar').innerHTML=
    `<div class="chips">${chips.map(([m,l])=>`<button data-filter="${m}" class="${filter.mode===m?'active':''}">${l}</button>`).join('')}</div>
     ${custom}<span class="range-txt">${rtxt}</span>`;
}
function renderSidebar(){ document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.nav===activeTab)); }

function render(){
  const range=currentRange();
  renderSidebar(); renderToolbar(range);
  if(activeTab==='comp') renderComp(range); else renderPerson(activeTab,range);
}

/* ===================== Eventos ===================== */
document.addEventListener('click',e=>{
  const nav=e.target.closest('[data-nav]'); if(nav){ activeTab=nav.dataset.nav; render(); return; }
  const f=e.target.closest('[data-filter]'); if(f){ if(f.dataset.filter==='custom'&&filter.mode!=='custom'){ const r=currentRange(); filter.from=r[0]; filter.to=r[r.length-1]; } filter.mode=f.dataset.filter; render(); return; }
  const t=e.target.closest('[data-toggle]'); if(t){ const [pid,hid,iso]=t.dataset.toggle.split('|'); const k=hid+'__'+iso;
    const was=!!DATA[pid][k];
    // Atualização otimista: muda na hora e salva no servidor em seguida.
    if(was) delete DATA[pid][k]; else DATA[pid][k]=true; render();
    saveToggle(pid,hid,iso).catch(()=>{
      // Reverte se o servidor falhar.
      if(was) DATA[pid][k]=true; else delete DATA[pid][k]; render();
      alert('Não consegui salvar agora. Verifique a conexão e tente de novo.');
    });
    return; }
});
document.addEventListener('change',e=>{
  if(e.target.id==='from'||e.target.id==='to'){ filter.from=document.getElementById('from').value; filter.to=document.getElementById('to').value; filter.mode='custom'; render(); }
});

/* ===================== Boot ===================== */
(async function init(){ await loadData(); render(); })();
</script>
